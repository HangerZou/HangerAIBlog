<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>博客管理后台</title>
</head>
<body>
  <!-- Sveltia CMS - Decap CMS 的现代替代品 -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'HangerZou/HangerAIBlog',
          branch: 'main',
          base_url: 'https://decap-oauth.netlify.app',
          auth_type: 'pkce'
        },
        media_folder: 'public/uploads',
        public_folder: '/uploads',
        collections: [
          {
            name: 'zh-blog',
            label: '博客文章',
            folder: 'src/content/zh/blog',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            fields: [
              { label: '标题', name: 'title', widget: 'string' },
              { label: '描述', name: 'description', widget: 'text' },
              { label: '日期', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: '标签', name: 'tags', widget: 'list', allow_add: true },
              { label: '正文', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'zh-tutorial',
            label: '教程',
            folder: 'src/content/zh/tutorials',
            create: true,
            slug: '{{slug}}',
            nested: { depth: 3 },
            fields: [
              { label: '标题', name: 'title', widget: 'string' },
              { label: '描述', name: 'description', widget: 'text' },
              { label: '日期', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: '标签', name: 'tags', widget: 'list', allow_add: true },
              { label: '正文', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
