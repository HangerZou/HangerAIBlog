<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>博客管理后台</title>
</head>
<body>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@3.3.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'HangerZou/HangerAIBlog',
          branch: 'main',
          base_url: 'https://decap-oauth.netlify.app',
          auth_type: 'pkce'
        },
        publish_mode: 'editorial_workflow',
        media_folder: 'public/uploads',
        public_folder: '/uploads',
        collections: [
          {
            name: 'zh-blog',
            label: '博客文章（中文）',
            folder: 'src/content/zh/blog',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            fields: [
              { label: '标题', name: 'title', widget: 'string' },
              { label: '描述', name: 'description', widget: 'text' },
              { label: '发布日期', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: '标签', name: 'tags', widget: 'list', allow_add: true },
              { label: '正文', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'en-blog',
            label: 'Blog Posts (EN)',
            folder: 'src/content/en/blog',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Description', name: 'description', widget: 'text' },
              { label: 'Date', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: 'Tags', name: 'tags', widget: 'list', allow_add: true },
              { label: 'Body', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'zh-claude-tutorial',
            label: 'Claude 教程（中文）',
            folder: 'src/content/zh/tutorials/claude',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: '标题', name: 'title', widget: 'string' },
              { label: '描述', name: 'description', widget: 'text' },
              { label: '发布日期', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: '标签', name: 'tags', widget: 'list', allow_add: true },
              { label: '正文', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'zh-llamafactory-tutorial',
            label: 'LlamaFactory 教程（中文）',
            folder: 'src/content/zh/tutorials/llamafactory',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: '标题', name: 'title', widget: 'string' },
              { label: '描述', name: 'description', widget: 'text' },
              { label: '发布日期', name: 'date', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: '标签', name: 'tags', widget: 'list', allow_add: true },
              { label: '正文', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
